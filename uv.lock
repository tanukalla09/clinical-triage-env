version = 1
revision = 1
requires-python = ">=3.10"

[[package]]
name = "clinical-triage-env"
version = "2.0.0"
source = { editable = "." }
dependencies = [
  { name = "fastapi" },
  { name = "uvicorn", extra = ["standard"] },
  { name = "pydantic" },
  { name = "openai" },
  { name = "aiofiles" },
  { name = "openenv-core" },
]

[package.metadata]
requires-dist = [
  { name = "fastapi", specifier = ">=0.111.0" },
  { name = "uvicorn", extras = ["standard"], specifier = ">=0.29.0" },
  { name = "pydantic", specifier = ">=2.7.1" },
  { name = "openai", specifier = ">=1.30.0" },
  { name = "aiofiles", specifier = ">=23.2.1" },
  { name = "openenv-core", specifier = ">=0.2.0" },
]
